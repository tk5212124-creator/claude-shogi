name: Deploy Shogi to GitHub Pages

on:
  push:
    branches:
      - claude/shogi-app-debug-40abyr
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build site (shogi.html as index.html)
        run: |
          mkdir -p _site
          cp shogi.html _site/index.html
          cp shogi.html _site/shogi.html
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
